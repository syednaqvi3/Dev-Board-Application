apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: devboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432

          envFrom:
            - secretRef:
                name: devboard-secret

          volumeMounts:
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d

      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
